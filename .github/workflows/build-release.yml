name: Build and Release

on:
    push:
        branches:
            - main
            - criptograph
        tags:
            - "v*"
    workflow_dispatch:

jobs:
    build-windows:
        runs-on: windows-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pyinstaller

            - name: Build executable
              run: |
                  python -m PyInstaller --onefile --noconsole --icon=src/assets/icon/passwords-manager.ico --name=passwords-manager main.py

            - name: Prepare release files
              run: |
                  mkdir release
                  copy dist\passwords-manager.exe release\
                  copy README.md release\
                  copy LICENSE release\
                  copy ENCRYPTION.md release\ 2>nul || copy CRIPTOGRAFIA.md release\

            - name: Create ZIP archive
              run: |
                  Compress-Archive -Path release\* -DestinationPath passwords-manager-windows.zip

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: passwords-manager-windows
                  path: passwords-manager-windows.zip

            - name: Get version info
              id: version
              shell: bash
              run: |
                  if [[ $GITHUB_REF == refs/tags/* ]]; then
                    VERSION=${GITHUB_REF#refs/tags/}
                  else
                    VERSION="latest"
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Building version: $VERSION"

            - name: Create or Update Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ steps.version.outputs.version }}
                  name: ${{ steps.version.outputs.version == 'latest' && 'Latest Development Build' || steps.version.outputs.version }}
                  body: |
                      ## 🔐 Password Manager - ${{ steps.version.outputs.version }}

                      ### 📥 Download

                      Download the `passwords-manager-windows.zip` file, extract it and run `passwords-manager.exe`.

                      ### ✨ Features

                      - ✅ Secure password management
                      - 🔐 Automatic AES encryption
                      - 🔄 Automatic migration of old files
                      - 🔍 Integrated search system
                      - 🎲 Simple and complex password generator

                      ### ⚠️ Important

                      - **Keep the `encryption.key` file in a safe location!**
                      - See `README.md` and `ENCRYPTION.md` for more information

                      ### 📝 Changelog

                      Automatic build generated from commit: ${{ github.sha }}

                      ---

                      **Data de Build:** ${{ github.event.head_commit.timestamp }}
                      **Branch:** ${{ github.ref_name }}
                  files: |
                      passwords-manager-windows.zip
                  draft: false
                  prerelease: ${{ steps.version.outputs.version == 'latest' }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-linux:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pyinstaller

            - name: Build executable
              run: |
                  python -m PyInstaller --onefile --noconsole --name=passwords-manager main.py

            - name: Prepare release files
              run: |
                  mkdir release
                  cp dist/passwords-manager release/
                  cp README.md release/
                  cp LICENSE release/
                  cp ENCRYPTION.md release/ 2>/dev/null || cp CRIPTOGRAFIA.md release/
                  chmod +x release/passwords-manager

            - name: Create TAR.GZ archive
              run: |
                  cd release
                  tar -czf ../passwords-manager-linux.tar.gz *
                  cd ..

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: passwords-manager-linux
                  path: passwords-manager-linux.tar.gz

            - name: Get version info
              id: version
              run: |
                  if [[ $GITHUB_REF == refs/tags/* ]]; then
                    VERSION=${GITHUB_REF#refs/tags/}
                  else
                    VERSION="latest"
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Update Release with Linux build
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ steps.version.outputs.version }}
                  files: |
                      passwords-manager-linux.tar.gz

                      build-macos:
                          runs-on: macos-latest

                          steps:
                              - name: Checkout code
                                uses: actions/checkout@v4

                              - name: Set up Python
                                uses: actions/setup-python@v5
                                with:
                                    python-version: "3.11"

                              - name: Install dependencies
                                run: |
                                    python -m pip install --upgrade pip
                                    pip install -r requirements.txt
                                    pip install pyinstaller

                              - name: Build executable
                                run: |
                                    python -m PyInstaller --onefile --windowed --name=passwords-manager main.py

                              - name: Prepare release files
                                run: |
                                    mkdir release
                                    cp dist/passwords-manager release/
                                    cp README.md release/
                                    cp LICENSE release/
                                    cp ENCRYPTION.md release/ 2>/dev/null || cp CRIPTOGRAFIA.md release/
                                    chmod +x release/passwords-manager

                              - name: Create TAR.GZ archive
                                run: |
                                    cd release
                                    tar -czf ../passwords-manager-macos.tar.gz *
                                    cd ..

                              - name: Upload artifact
                                uses: actions/upload-artifact@v4
                                with:
                                    name: passwords-manager-macos
                                    path: passwords-manager-macos.tar.gz

                              - name: Get version info
                                id: version
                                run: |
                                    if [[ $GITHUB_REF == refs/tags/* ]]; then
                                      VERSION=${GITHUB_REF#refs/tags/}
                                    else
                                      VERSION="latest"
                                    fi
                                    echo "version=$VERSION" >> $GITHUB_OUTPUT

                              - name: Update Release with macOS build
                                uses: softprops/action-gh-release@v1
                                with:
                                    tag_name: ${{ steps.version.outputs.version }}
                                    files: |
                                        passwords-manager-macos.tar.gz
                                    draft: false
                                    prerelease: ${{ steps.version.outputs.version == 'latest' }}
                                env:
                                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  draft: false
                  prerelease: ${{ steps.version.outputs.version == 'latest' }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
