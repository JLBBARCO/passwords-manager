name: Build and Release

on:
  push:
    branches:
      - main
      - develop
      - criptograph
    tags:
      - "v*"
      - "beta*"
  workflow_dispatch:
    inputs:
      publish_packages:
        description: "Run Winget and Homebrew publish jobs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      publish_tag:
        description: "Tag to publish packages from (example: v1.2.3 or beta20260310120000-abc1234)"
        required: false
        default: ""
        type: string

jobs:
  prepare-release-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      release_tag: ${{ steps.release_context.outputs.release_tag }}
      build_version: ${{ steps.release_context.outputs.build_version }}
      publish_packages: ${{ steps.release_context.outputs.publish_packages }}
      winget_identifier: ${{ steps.release_context.outputs.winget_identifier }}
      homebrew_formula_file: ${{ steps.release_context.outputs.homebrew_formula_file }}
      homebrew_formula_class: ${{ steps.release_context.outputs.homebrew_formula_class }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release context and create tag on main/develop
        id: release_context
        shell: bash
        run: |
          RELEASE_TAG=""
          PUBLISH_PACKAGES="false"
          WINGET_IDENTIFIER="JLBBARCO.PasswordsManager"
          HOMEBREW_FORMULA_FILE="passwords-manager.rb"
          HOMEBREW_FORMULA_CLASS="PasswordsManager"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            PUBLISH_PACKAGES="true"
          elif [[ "${GITHUB_REF}" == refs/tags/beta* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            PUBLISH_PACKAGES="true"
            HOMEBREW_FORMULA_FILE="passwords-manager-beta.rb"
            HOMEBREW_FORMULA_CLASS="PasswordsManagerBeta"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.publish_tag }}" ]]; then
            RELEASE_TAG="${{ inputs.publish_tag }}"
            if [[ "${RELEASE_TAG}" != v* && "${RELEASE_TAG}" != beta* ]]; then
              RELEASE_TAG="v${RELEASE_TAG}"
            fi
            if [[ "${RELEASE_TAG}" == beta* ]]; then
              HOMEBREW_FORMULA_FILE="passwords-manager-beta.rb"
              HOMEBREW_FORMULA_CLASS="PasswordsManagerBeta"
            fi
            if [[ "${{ inputs.publish_packages }}" == "true" ]]; then
              PUBLISH_PACKAGES="true"
            fi
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            EXISTING_TAG=$(git tag --points-at "${GITHUB_SHA}" "v*" | head -n 1)

            if [[ -n "${EXISTING_TAG}" ]]; then
              RELEASE_TAG="${EXISTING_TAG}"
            else
              LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -n 1)

              if [[ -z "${LATEST_TAG}" ]]; then
                NEXT_TAG="v0.0.1"
              else
                VERSION_PART="${LATEST_TAG#v}"
                IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION_PART}"
                MAJOR=${MAJOR:-0}
                MINOR=${MINOR:-0}
                PATCH=${PATCH:-0}
                NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              fi

              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "${NEXT_TAG}" "${GITHUB_SHA}"
              git push origin "${NEXT_TAG}"
              RELEASE_TAG="${NEXT_TAG}"
            fi

            PUBLISH_PACKAGES="true"
          elif [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            EXISTING_BETA_TAG=$(git tag --points-at "${GITHUB_SHA}" "beta*" | head -n 1)

            if [[ -n "${EXISTING_BETA_TAG}" ]]; then
              RELEASE_TAG="${EXISTING_BETA_TAG}"
            else
              UTC_TS=$(date -u +%Y%m%d%H%M%S)
              SHORT_SHA=$(git rev-parse --short "${GITHUB_SHA}")
              NEXT_TAG="beta${UTC_TS}-${SHORT_SHA}"

              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "${NEXT_TAG}" "${GITHUB_SHA}"
              git push origin "${NEXT_TAG}"
              RELEASE_TAG="${NEXT_TAG}"
            fi

            PUBLISH_PACKAGES="true"
            HOMEBREW_FORMULA_FILE="passwords-manager-beta.rb"
            HOMEBREW_FORMULA_CLASS="PasswordsManagerBeta"
          else
            RELEASE_TAG="latest"
          fi

          if [[ "${RELEASE_TAG}" == v* ]]; then
            BUILD_VERSION="${RELEASE_TAG#v}"
          elif [[ "${RELEASE_TAG}" == beta* ]]; then
            BUILD_VERSION="${RELEASE_TAG}"
          else
            BUILD_VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "build_version=${BUILD_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "publish_packages=${PUBLISH_PACKAGES}" >> "${GITHUB_OUTPUT}"
          echo "winget_identifier=${WINGET_IDENTIFIER}" >> "${GITHUB_OUTPUT}"
          echo "homebrew_formula_file=${HOMEBREW_FORMULA_FILE}" >> "${GITHUB_OUTPUT}"
          echo "homebrew_formula_class=${HOMEBREW_FORMULA_CLASS}" >> "${GITHUB_OUTPUT}"
          echo "Resolved release tag: ${RELEASE_TAG}"

  build-windows:
    needs: [prepare-release-context]
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executables
        env:
          PASSWORDS_MANAGER_VERSION: ${{ needs.prepare-release-context.outputs.build_version }}
        run: |
          python -m PyInstaller --onefile --noconsole --icon=src/assets/icon/passwords-manager.ico --name=passwords-manager main.py
          python -m PyInstaller --onefile --noconsole --icon=src/assets/icon/passwords-manager.ico --name=uninstall uninstall.py
          python -m PyInstaller --onefile --noconsole --icon=src/assets/icon/passwords-manager.ico --name=install-passwords-manager install.py

      - name: Prepare release files
        run: |
          mkdir release
          mkdir release\uninstall
          mkdir installer-package
          copy dist\passwords-manager.exe release\
          copy dist\uninstall.exe release\uninstall\uninstall.exe
          echo ${{ needs.prepare-release-context.outputs.build_version }} > release\VERSION
          copy README.md release\
          copy LICENSE release\
          copy ENCRYPTION.md release\ 2>nul || copy CRIPTOGRAFIA.md release\ENCRYPTION.md
          copy dist\install-passwords-manager.exe installer-package\
          xcopy release installer-package\release\ /E /I /Y

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path installer-package\* -DestinationPath passwords-manager-windows.zip

      - name: Validate Windows payload and shortcut generation
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseRoot = Join-Path $PWD 'installer-package\release'
          $mainExe = Join-Path $releaseRoot 'passwords-manager.exe'
          $uninstallExe = Join-Path $releaseRoot 'uninstall\uninstall.exe'
          $installerExe = Join-Path $PWD 'installer-package\install-passwords-manager.exe'

          if (!(Test-Path $mainExe)) { throw "Missing payload file: $mainExe" }
          if (!(Test-Path $uninstallExe)) { throw "Missing payload file: $uninstallExe" }
          if (!(Test-Path $installerExe)) { throw "Missing installer file: $installerExe" }

          $testShortcutDir = Join-Path $env:RUNNER_TEMP 'passwords-manager-shortcut-validation'
          New-Item -ItemType Directory -Path $testShortcutDir -Force | Out-Null

          $shortcutPath = Join-Path $testShortcutDir 'Passwords Manager.lnk'
          $shell = New-Object -ComObject WScript.Shell
          $shortcut = $shell.CreateShortcut($shortcutPath)
          $shortcut.TargetPath = $mainExe
          $shortcut.WorkingDirectory = $releaseRoot
          $shortcut.IconLocation = "$mainExe,0"
          $shortcut.Description = 'Passwords Manager'
          $shortcut.Save()

          if (!(Test-Path $shortcutPath)) {
            throw "Shortcut was not created during validation: $shortcutPath"
          }

          Remove-Item -Path $testShortcutDir -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwords-manager-windows
          path: |
            passwords-manager-windows.zip
            installer-package/install-passwords-manager.exe

  build-linux:
    needs: [prepare-release-context]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore Android debug keystore cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: ${{ runner.os }}-android-debug-keystore-v1

      - name: Ensure Android keystore directory
        shell: bash
        run: |
          mkdir -p "$HOME/.android"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # Install tkinter dependencies for Linux
          sudo apt-get update
          sudo apt-get install -y python3-tk xclip icoutils imagemagick libfuse2 2>/dev/null || true

      - name: Build executable
        env:
          PASSWORDS_MANAGER_VERSION: ${{ needs.prepare-release-context.outputs.build_version }}
        run: |
          python -m PyInstaller --onefile --noconsole --name=passwords-manager main.py

      - name: Prepare release files
        run: |
          mkdir release
          cp dist/passwords-manager release/
          echo "${{ needs.prepare-release-context.outputs.build_version }}" > release/VERSION
          cp README.md release/
          cp LICENSE release/
          cp ENCRYPTION.md release/ 2>/dev/null || cp CRIPTOGRAFIA.md release/ 2>/dev/null || true
          chmod +x release/passwords-manager

      - name: Create TAR.GZ archive
        run: |
          cd release
          tar -czf ../passwords-manager-linux.tar.gz *
          cd ..

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications

          cp dist/passwords-manager AppDir/usr/bin/passwords-manager
          chmod +x AppDir/usr/bin/passwords-manager

          convert src/assets/icon/passwords-manager.ico AppDir/passwords-manager.png
          cp AppDir/passwords-manager.png AppDir/.DirIcon

          cat > AppDir/passwords-manager.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Passwords Manager
          Exec=passwords-manager
          Icon=passwords-manager
          Categories=Utility;Security;
          Terminal=false
          EOF

          cp AppDir/passwords-manager.desktop AppDir/usr/share/applications/passwords-manager.desktop

          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/passwords-manager" "$@"
          EOF
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir passwords-manager-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwords-manager-linux
          path: |
            passwords-manager-linux.tar.gz
            passwords-manager-x86_64.AppImage

  build-macos:
    needs: [prepare-release-context]
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        env:
          PASSWORDS_MANAGER_VERSION: ${{ needs.prepare-release-context.outputs.build_version }}
        run: |
          python -m PyInstaller --onefile --noconsole --name=passwords-manager main.py

      - name: Prepare release files
        run: |
          mkdir release
          cp dist/passwords-manager release/
          echo "${{ needs.prepare-release-context.outputs.build_version }}" > release/VERSION
          cp README.md release/
          cp LICENSE release/
          cp ENCRYPTION.md release/ 2>/dev/null || cp CRIPTOGRAFIA.md release/ 2>/dev/null || true
          chmod +x release/passwords-manager

      - name: Create TAR.GZ archive
        run: |
          cd release
          tar -czf ../passwords-manager-macos.tar.gz *
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwords-manager-macos
          path: passwords-manager-macos.tar.gz

  build-android-apk:
    needs: [prepare-release-context]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Android build inputs
        shell: bash
        run: |
          SPEC_PATH=""
          SPEC_DIR="."

          if [[ -f "buildozer.spec" ]]; then
            SPEC_PATH="buildozer.spec"
            SPEC_DIR="."
          elif [[ -f "android/buildozer.spec" ]]; then
            SPEC_PATH="android/buildozer.spec"
            SPEC_DIR="android"
          fi

          if [[ ! -f "android/main.py" ]]; then
            echo "android/main.py not found" >&2
            exit 1
          fi

          if [[ -z "${SPEC_PATH}" ]]; then
            printf '%s\n' \
              '[app]' \
              'title = Passwords Manager' \
              'package.name = passwordsmanager' \
              'package.domain = com.jlbbarco' \
              'source.dir = android' \
              'source.include_exts = py,png,jpg,jpeg,kv,atlas' \
              'version = 0.0.0' \
              'requirements = python3,kivy==2.3.0' \
              'orientation = portrait' \
              'fullscreen = 0' \
              'android.permissions = INTERNET' \
              'android.api = 34' \
              'android.minapi = 24' \
              'android.ndk = 25b' \
              'android.archs = arm64-v8a,armeabi-v7a,x86_64' \
              '' \
              '[buildozer]' \
              'log_level = 2' \
              'warn_on_root = 1' \
              > buildozer.spec
            SPEC_PATH="buildozer.spec"
            SPEC_DIR="."
            echo "buildozer.spec not found. Generated fallback buildozer.spec at repository root."
          fi

          if ! grep -qE "^source\.dir[[:space:]]*=[[:space:]]*(android|\.)$" "${SPEC_PATH}"; then
            echo "buildozer.spec must contain: source.dir = android or source.dir = ." >&2
            exit 1
          fi

          if ! grep -qE "^android\.accept_sdk_license[[:space:]]*=[[:space:]]*True$" "${SPEC_PATH}"; then
            echo "android.accept_sdk_license = True" >> "${SPEC_PATH}"
          fi

          if grep -qE "^android\.api[[:space:]]*=" "${SPEC_PATH}"; then
            sed -i -E 's/^android\.api[[:space:]]*=.*/android.api = 34/' "${SPEC_PATH}"
          else
            echo "android.api = 34" >> "${SPEC_PATH}"
          fi

          if grep -qE "^android\.archs[[:space:]]*=" "${SPEC_PATH}"; then
            sed -i -E 's/^android\.archs[[:space:]]*=.*/android.archs = arm64-v8a,armeabi-v7a,x86_64/' "${SPEC_PATH}"
          else
            echo "android.archs = arm64-v8a,armeabi-v7a,x86_64" >> "${SPEC_PATH}"
          fi

          NUMERIC_VERSION="${GITHUB_RUN_NUMBER}"
          if grep -qE "^android\.numeric_version[[:space:]]*=" "${SPEC_PATH}"; then
            sed -i -E "s/^android\\.numeric_version[[:space:]]*=.*/android.numeric_version = ${NUMERIC_VERSION}/" "${SPEC_PATH}"
          else
            echo "android.numeric_version = ${NUMERIC_VERSION}" >> "${SPEC_PATH}"
          fi

          echo "Using spec: ${SPEC_PATH}"
          echo "SPEC_DIR=${SPEC_DIR}" >> "$GITHUB_ENV"

      - name: Install Android build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake m4 libtool libltdl-dev pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev

          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Build APK (debug)
        shell: bash
        run: |
          BUILD_LOG="${RUNNER_TEMP}/buildozer-debug.log"

          run_build() {
            local build_status=0

            if [[ "${SPEC_DIR}" == "android" ]]; then
              pushd android >/dev/null
              set +e
              buildozer android debug 2>&1 | tee "${BUILD_LOG}"
              build_status=${PIPESTATUS[0]}
              set -e
              popd >/dev/null
            else
              set +e
              buildozer android debug 2>&1 | tee "${BUILD_LOG}"
              build_status=${PIPESTATUS[0]}
              set -e
            fi

            if [[ ${build_status} -ne 0 ]]; then
              echo "Buildozer failed. Last 200 log lines:"
              tail -n 200 "${BUILD_LOG}" || true
              echo "Filtered failure lines:"
              grep -Ei "error:|traceback|exception|aidl|sdkmanager|license|failed to execute|no such file|command not found" "${BUILD_LOG}" | tail -n 120 || true
            fi

            return ${build_status}
          }

          accept_android_licenses() {
            SDK_ROOT=$(find "$HOME/.buildozer" -type d -path "*/android-sdk" | head -n 1 || true)
            if [[ -z "${SDK_ROOT}" ]]; then
              echo "Android SDK root not found yet under ~/.buildozer; skipping proactive license acceptance."
              return 0
            fi

            SDKMANAGER_PATH=""
            if [[ -x "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" ]]; then
              SDKMANAGER_PATH="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
            elif [[ -x "${SDK_ROOT}/tools/bin/sdkmanager" ]]; then
              SDKMANAGER_PATH="${SDK_ROOT}/tools/bin/sdkmanager"
            fi

            if [[ -z "${SDKMANAGER_PATH}" ]]; then
              echo "sdkmanager not found yet under ~/.buildozer; skipping proactive license acceptance."
              return 0
            fi

            mkdir -p "$HOME/.android"
            touch "$HOME/.android/repositories.cfg"

            mkdir -p "${SDK_ROOT}/licenses"
            printf '%s\n' \
              '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
              'd56f5187479451eabf01fb78af6dfcb131a6481e' \
              > "${SDK_ROOT}/licenses/android-sdk-license"
            printf '%s\n' \
              '84831b9409646a918e30573bab4c9c91346d8abd' \
              > "${SDK_ROOT}/licenses/android-sdk-preview-license"

            yes | "${SDKMANAGER_PATH}" --sdk_root="${SDK_ROOT}" --licenses >/dev/null || true
            yes | "${SDKMANAGER_PATH}" --sdk_root="${SDK_ROOT}" --update >/dev/null || true
            yes | "${SDKMANAGER_PATH}" --sdk_root="${SDK_ROOT}" \
              "platform-tools" "platforms;android-34" "build-tools;33.0.2" "build-tools;37.0.0-rc2" >/dev/null || true
          }

          accept_android_licenses

          if ! run_build; then
            echo "First Android build attempt failed. Accepting Android SDK licenses and retrying once..."
            accept_android_licenses
            run_build
          fi

      - name: Verify APK output
        shell: bash
        run: |
          mkdir -p artifacts
          find . -type f -path "*/bin/*.apk" -exec cp {} artifacts/ \;
          if [[ -f "${RUNNER_TEMP}/buildozer-debug.log" ]]; then
            cp "${RUNNER_TEMP}/buildozer-debug.log" artifacts/buildozer-debug.log
          fi

          shopt -s nullglob
          APK_FILES=(artifacts/*.apk)
          if [[ ${#APK_FILES[@]} -eq 0 ]]; then
            echo "No APK file found in */bin/ after build" >&2
            exit 1
          fi
          printf 'APK generated: %s\n' "${APK_FILES[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwords-manager-android-apk
          path: |
            artifacts/*.apk
            artifacts/buildozer-debug.log

  create-release:
    needs:
      [
        prepare-release-context,
        build-windows,
        build-linux,
        build-macos,
        build-android-apk,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify release assets are present
        shell: bash
        run: |
          REQUIRED_FILES=(
            "artifacts/passwords-manager-windows/passwords-manager-windows.zip"
            "artifacts/passwords-manager-windows/installer-package/install-passwords-manager.exe"
            "artifacts/passwords-manager-linux/passwords-manager-linux.tar.gz"
            "artifacts/passwords-manager-linux/passwords-manager-x86_64.AppImage"
            "artifacts/passwords-manager-macos/passwords-manager-macos.tar.gz"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing release asset: $file" >&2
              exit 1
            fi
          done

          shopt -s nullglob
          APK_FILES=(artifacts/passwords-manager-android-apk/*.apk)
          if [[ ${#APK_FILES[@]} -eq 0 ]]; then
            echo "Android APK not found. Release will be created without APK."
            echo "Android APK not found. Release was created with desktop artifacts only." >> "$GITHUB_STEP_SUMMARY"
          else
            printf 'Android APK assets found: %s\n' "${APK_FILES[@]}"
          fi

      - name: Get version info
        id: version
        shell: bash
        run: |
          VERSION="${{ needs.prepare-release-context.outputs.release_tag }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version == 'latest' && 'Latest Development Build' || steps.version.outputs.version }}
          body: |
            ## 🔐 Password Manager - ${{ steps.version.outputs.version }}

            ### Download

            - **Windows**: `passwords-manager-windows.zip`
            - **Linux**: `passwords-manager-linux.tar.gz`
            - **Linux AppImage**: `passwords-manager-x86_64.AppImage`
            - **macOS**: `passwords-manager-macos.tar.gz`
            - **Android (APK)**: `passwords-manager-*.apk`

            ### Features

            - ✅ Secure password management
            - 🔐 Automatic AES encryption
            - 🔄 Automatic migration of old files
            - 🔍 Integrated search system
            - 🎲 Simple and complex password generator

            ### Important

            - **Keep the `encryption.key` file in a safe location!**
            - See `README.md` and `ENCRYPTION.md` for more information

            ### Changelog

            Automatic build generated from commit: ${{ github.sha }}

            ---

            **Build Date:** ${{ github.event.head_commit.timestamp || 'n/a' }}
            **Branch:** ${{ github.ref_name }}
          files: |
            artifacts/passwords-manager-windows/passwords-manager-windows.zip
            artifacts/passwords-manager-windows/installer-package/install-passwords-manager.exe
            artifacts/passwords-manager-linux/passwords-manager-linux.tar.gz
            artifacts/passwords-manager-linux/passwords-manager-x86_64.AppImage
            artifacts/passwords-manager-macos/passwords-manager-macos.tar.gz
            scripts/install-unix.sh
            scripts/uninstall-unix.sh
            packaging/homebrew/passwords-manager.rb
          draft: false
          prerelease: ${{ startsWith(steps.version.outputs.version, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Android APK artifact presence
        id: android_apk
        shell: bash
        run: |
          shopt -s nullglob
          APK_FILES=(artifacts/passwords-manager-android-apk/*.apk)
          if [[ ${#APK_FILES[@]} -gt 0 ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            printf 'Android APK files to attach: %s\n' "${APK_FILES[@]}"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Android APK files available to attach in this run."
          fi

      - name: Attach Android APK to existing release
        if: steps.android_apk.outputs.found == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            artifacts/passwords-manager-android-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-winget:
    needs: [prepare-release-context, create-release]
    runs-on: ubuntu-latest
    if: needs.prepare-release-context.outputs.publish_packages == 'true' && startsWith(needs.prepare-release-context.outputs.release_tag, 'v')
    permissions:
      contents: read

    steps:
      - name: Check if package exists in winget-pkgs
        id: winget_check
        shell: bash
        run: |
          IDENTIFIER="${{ needs.prepare-release-context.outputs.winget_identifier }}"
          IFS='.' read -r -a PARTS <<< "${IDENTIFIER}"

          if [[ ${#PARTS[@]} -lt 2 ]]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Invalid Winget identifier: ${IDENTIFIER}"
            exit 0
          fi

          FIRST_CHAR=$(echo "${IDENTIFIER}" | tr '[:upper:]' '[:lower:]' | cut -c1)
          MANIFEST_PATH="manifests/${FIRST_CHAR}/${PARTS[0]}/${PARTS[1]}"
          if [[ ${#PARTS[@]} -gt 2 ]]; then
            for ((i=2; i<${#PARTS[@]}; i++)); do
              MANIFEST_PATH+="/${PARTS[i]}"
            done
          fi

          CHECK_URL="https://api.github.com/repos/microsoft/winget-pkgs/contents/${MANIFEST_PATH}"
          HTTP_CODE=$(curl -s -o /tmp/winget-check.json -w "%{http_code}" "${CHECK_URL}")

          if [[ "${HTTP_CODE}" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Winget package exists for ${IDENTIFIER}."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Winget package does not exist for ${IDENTIFIER}. Skipping automatic publish."
          fi

      - name: Validate Winget token
        if: steps.winget_check.outputs.exists == 'true'
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${WINGET_TOKEN}" ]]; then
            echo "WINGET_TOKEN secret is required for winget-releaser." >&2
            exit 1
          fi

      - name: Debug release assets for Winget
        if: steps.winget_check.outputs.exists == 'true'
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.prepare-release-context.outputs.release_tag }}"
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          echo "Checking release assets for tag: ${RELEASE_TAG}"
          curl -fsSL -H "Authorization: Bearer ${{ github.token }}" -H "Accept: application/vnd.github+json" "${API_URL}" \
            | python -c "import sys, json; data=json.load(sys.stdin); assets=data.get('assets', []); print('Assets found:' if assets else 'No assets found'); [print(f\"- {a.get('name')}\") for a in assets]"

      - name: Ensure installer asset exists for Winget
        if: steps.winget_check.outputs.exists == 'true'
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.prepare-release-context.outputs.release_tag }}"
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"

          ASSET_NAMES=$(curl -fsSL -H "Authorization: Bearer ${{ github.token }}" -H "Accept: application/vnd.github+json" "${API_URL}" \
            | python -c "import sys, json; data=json.load(sys.stdin); print('\\n'.join(a.get('name','') for a in data.get('assets', [])))")

          echo "Release assets evaluated for Winget:"
          echo "${ASSET_NAMES}"

          if ! echo "${ASSET_NAMES}" | grep -Eq '^install-passwords-manager\.exe$'; then
            echo "Required Winget installer asset not found: install-passwords-manager.exe" >&2
            exit 1
          fi

      - name: Publish to winget
        if: steps.winget_check.outputs.exists == 'true'
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          token: ${{ secrets.WINGET_TOKEN }}
          identifier: ${{ needs.prepare-release-context.outputs.winget_identifier }}
          installers-regex: '^install-passwords-manager\.exe$'
          release-tag: ${{ needs.prepare-release-context.outputs.release_tag }}
          release-repository: ${{ github.event.repository.name }}
          fork-user: ${{ github.repository_owner }}

      - name: Inform Winget bootstrap requirement
        if: steps.winget_check.outputs.exists != 'true'
        shell: bash
        run: |
          echo "Winget publish skipped: package identifier not found in microsoft/winget-pkgs." >> "$GITHUB_STEP_SUMMARY"
          echo "Create the first package version manually, then this workflow will publish updates automatically." >> "$GITHUB_STEP_SUMMARY"

  publish-homebrew:
    needs: [prepare-release-context, create-release]
    runs-on: ubuntu-latest
    if: needs.prepare-release-context.outputs.publish_packages == 'true'
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_REPOSITORY: ""
      HOMEBREW_TAP_TOKEN: ${{ github.token }}

    steps:
      - name: Resolve version and URLs
        id: vars
        run: |
          RELEASE_TAG="${{ needs.prepare-release-context.outputs.release_tag }}"

          VERSION="${RELEASE_TAG#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          LINUX_URL="${BASE_URL}/passwords-manager-linux.tar.gz"
          MAC_URL="${BASE_URL}/passwords-manager-macos.tar.gz"

          curl -fsSL "${LINUX_URL}" -o linux.tar.gz
          curl -fsSL "${MAC_URL}" -o macos.tar.gz

          LINUX_SHA=$(sha256sum linux.tar.gz | awk '{print $1}')
          MAC_SHA=$(shasum -a 256 macos.tar.gz | awk '{print $1}')

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "linux_url=${LINUX_URL}" >> $GITHUB_OUTPUT
          echo "mac_url=${MAC_URL}" >> $GITHUB_OUTPUT
          echo "linux_sha=${LINUX_SHA}" >> $GITHUB_OUTPUT
          echo "mac_sha=${MAC_SHA}" >> $GITHUB_OUTPUT

      - name: Check access to Homebrew tap repository
        id: tap_access
        shell: bash
        run: |
          if [[ -z "${HOMEBREW_TAP_REPOSITORY}" ]]; then
            echo "accessible=false" >> "$GITHUB_OUTPUT"
            echo "Homebrew tap repository not configured."
            exit 0
          fi

          REPO_API="https://api.github.com/repos/${HOMEBREW_TAP_REPOSITORY}"

          HTTP_CODE=$(curl -s -o /tmp/homebrew-tap-check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${REPO_API}")

          if [[ "${HTTP_CODE}" == "200" ]]; then
            echo "accessible=true" >> "$GITHUB_OUTPUT"
            echo "Homebrew tap repository is accessible."
          else
            echo "accessible=false" >> "$GITHUB_OUTPUT"
            echo "Homebrew tap repository is not accessible (HTTP ${HTTP_CODE})."
          fi

      - name: Checkout homebrew tap repository
        if: steps.tap_access.outputs.accessible == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        if: steps.tap_access.outputs.accessible == 'true'
        run: |
          FORMULA_FILE="${{ needs.prepare-release-context.outputs.homebrew_formula_file }}"
          FORMULA_CLASS="${{ needs.prepare-release-context.outputs.homebrew_formula_class }}"

          mkdir -p homebrew-tap/Formula
          cat > "homebrew-tap/Formula/${FORMULA_FILE}" << EOF
          class ${FORMULA_CLASS} < Formula
            desc "Password manager with encrypted local storage"
            homepage "https://github.com/JLBBARCO/passwords-manager"
            version "${{ steps.vars.outputs.version }}"

            on_macos do
              url "${{ steps.vars.outputs.mac_url }}"
              sha256 "${{ steps.vars.outputs.mac_sha }}"
            end

            on_linux do
              url "${{ steps.vars.outputs.linux_url }}"
              sha256 "${{ steps.vars.outputs.linux_sha }}"
            end

            def install
              bin.install "passwords-manager"
              prefix.install "README.md" if File.exist?("README.md")
              prefix.install "LICENSE" if File.exist?("LICENSE")
            end

            test do
              assert_predicate bin/"passwords-manager", :exist?
            end
          end
          EOF

      - name: Commit and push formula update
        if: steps.tap_access.outputs.accessible == 'true'
        run: |
          cd homebrew-tap
          FORMULA_FILE="${{ needs.prepare-release-context.outputs.homebrew_formula_file }}"
          FORMULA_NAME="${FORMULA_FILE%.rb}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA_FILE}"
          git commit -m "chore: update ${FORMULA_NAME} to ${{ steps.vars.outputs.version }}" || exit 0
          git push

      - name: Inform Homebrew tap access requirement
        if: steps.tap_access.outputs.accessible != 'true'
        shell: bash
        run: |
          if [[ -z "${HOMEBREW_TAP_REPOSITORY}" ]]; then
            echo "Homebrew publish skipped: set HOMEBREW_TAP_REPOSITORY in workflow env (example: JLBBARCO/homebrew-tap)." >> "$GITHUB_STEP_SUMMARY"
            echo "Create a tap repository first, then this workflow will publish formula updates automatically." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Homebrew publish skipped: repository ${HOMEBREW_TAP_REPOSITORY} is not accessible with current token." >> "$GITHUB_STEP_SUMMARY"
            echo "The default github.token usually cannot write across repositories. Use a PAT with repo permissions if needed." >> "$GITHUB_STEP_SUMMARY"
          fi
