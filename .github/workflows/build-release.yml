name: Build and Release

on:
  push:
    branches:
      - main
      - criptograph
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve build version
        id: build_version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -ne "tag") {
            $version = "0.0.0-dev.${{ github.run_number }}"
          } else {
            $version = $version -replace '^v', ''
          }
          "build_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Build version: $version"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executables
        env:
          PASSWORDS_MANAGER_VERSION: ${{ steps.build_version.outputs.build_version }}
        run: |
          python -m PyInstaller --onefile --noconsole --icon=src/assets/icon/passwords-manager.ico --name=passwords-manager main.py
          python -m PyInstaller --onefile --noconsole --icon=src/assets/icon/passwords-manager.ico --name=uninstall uninstall.py
          python -m PyInstaller --onefile --noconsole --icon=src/assets/icon/passwords-manager.ico --name=install-passwords-manager install.py

      - name: Prepare release files
        run: |
          mkdir release
          mkdir release\uninstall
          mkdir installer-package
          copy dist\passwords-manager.exe release\
          copy dist\uninstall.exe release\uninstall\uninstall.exe
          echo ${{ steps.build_version.outputs.build_version }} > release\VERSION
          copy README.md release\
          copy LICENSE release\
          copy ENCRYPTION.md release\ 2>nul || copy CRIPTOGRAFIA.md release\ENCRYPTION.md
          copy dist\install-passwords-manager.exe installer-package\
          xcopy release installer-package\release\ /E /I /Y

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path installer-package\* -DestinationPath passwords-manager-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwords-manager-windows
          path: |
            passwords-manager-windows.zip
            installer-package/install-passwords-manager.exe

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve build version
        id: build_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "build_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Build version: ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # Install tkinter dependencies for Linux
          sudo apt-get update
          sudo apt-get install -y python3-tk xclip icoutils imagemagick libfuse2 2>/dev/null || true

      - name: Build executable
        env:
          PASSWORDS_MANAGER_VERSION: ${{ steps.build_version.outputs.build_version }}
        run: |
          python -m PyInstaller --onefile --noconsole --name=passwords-manager main.py

      - name: Prepare release files
        run: |
          mkdir release
          cp dist/passwords-manager release/
          echo "${{ steps.build_version.outputs.build_version }}" > release/VERSION
          cp README.md release/
          cp LICENSE release/
          cp ENCRYPTION.md release/ 2>/dev/null || cp CRIPTOGRAFIA.md release/ 2>/dev/null || true
          chmod +x release/passwords-manager

      - name: Create TAR.GZ archive
        run: |
          cd release
          tar -czf ../passwords-manager-linux.tar.gz *
          cd ..

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications

          cp dist/passwords-manager AppDir/usr/bin/passwords-manager
          chmod +x AppDir/usr/bin/passwords-manager

          convert src/assets/icon/passwords-manager.ico AppDir/passwords-manager.png
          cp AppDir/passwords-manager.png AppDir/.DirIcon

          cat > AppDir/passwords-manager.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Passwords Manager
          Exec=passwords-manager
          Icon=passwords-manager
          Categories=Utility;Security;
          Terminal=false
          EOF

          cp AppDir/passwords-manager.desktop AppDir/usr/share/applications/passwords-manager.desktop

          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/passwords-manager" "$@"
          EOF
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir passwords-manager-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwords-manager-linux
          path: |
            passwords-manager-linux.tar.gz
            passwords-manager-x86_64.AppImage

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve build version
        id: build_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "build_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Build version: ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        env:
          PASSWORDS_MANAGER_VERSION: ${{ steps.build_version.outputs.build_version }}
        run: |
          python -m PyInstaller --onefile --noconsole --name=passwords-manager main.py

      - name: Prepare release files
        run: |
          mkdir release
          cp dist/passwords-manager release/
          echo "${{ steps.build_version.outputs.build_version }}" > release/VERSION
          cp README.md release/
          cp LICENSE release/
          cp ENCRYPTION.md release/ 2>/dev/null || cp CRIPTOGRAFIA.md release/ 2>/dev/null || true
          chmod +x release/passwords-manager

      - name: Create TAR.GZ archive
        run: |
          cd release
          tar -czf ../passwords-manager-macos.tar.gz *
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwords-manager-macos
          path: passwords-manager-macos.tar.gz

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version info
        id: version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version == 'latest' && 'Latest Development Build' || steps.version.outputs.version }}
          body: |
            ## 🔐 Password Manager - ${{ steps.version.outputs.version }}

            ### Download

            - **Windows**: `passwords-manager-windows.zip`
            - **Linux**: `passwords-manager-linux.tar.gz`
            - **Linux AppImage**: `passwords-manager-x86_64.AppImage`
            - **macOS**: `passwords-manager-macos.tar.gz`

            ### Features

            - ✅ Secure password management
            - 🔐 Automatic AES encryption
            - 🔄 Automatic migration of old files
            - 🔍 Integrated search system
            - 🎲 Simple and complex password generator

            ### Important

            - **Keep the `encryption.key` file in a safe location!**
            - See `README.md` and `ENCRYPTION.md` for more information

            ### Changelog

            Automatic build generated from commit: ${{ github.sha }}

            ---

            **Build Date:** ${{ github.event.head_commit.timestamp || 'n/a' }}
            **Branch:** ${{ github.ref_name }}
          files: |
            artifacts/passwords-manager-windows/passwords-manager-windows.zip
            artifacts/passwords-manager-windows/install-passwords-manager.exe
            artifacts/passwords-manager-linux/passwords-manager-linux.tar.gz
            artifacts/passwords-manager-linux/passwords-manager-x86_64.AppImage
            artifacts/passwords-manager-macos/passwords-manager-macos.tar.gz
            scripts/install-unix.sh
            scripts/uninstall-unix.sh
            packaging/homebrew/passwords-manager.rb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-winget:
    needs: [create-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Resolve winget token
        id: winget_token
        shell: bash
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          if [[ -n "${WINGET_TOKEN}" ]]; then
            echo "token=${WINGET_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${GITHUB_TOKEN_FALLBACK}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to winget
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          token: ${{ steps.winget_token.outputs.token }}
          identifier: JLBBARCO.PasswordsManager
          installers-regex: 'install-passwords-manager\.exe$'

  publish-homebrew:
    needs: [create-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Resolve homebrew tap token
        id: tap_token
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          if [[ -n "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "token=${HOMEBREW_TAP_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${GITHUB_TOKEN_FALLBACK}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version and URLs
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          LINUX_URL="${BASE_URL}/passwords-manager-linux.tar.gz"
          MAC_URL="${BASE_URL}/passwords-manager-macos.tar.gz"

          curl -fsSL "${LINUX_URL}" -o linux.tar.gz
          curl -fsSL "${MAC_URL}" -o macos.tar.gz

          LINUX_SHA=$(sha256sum linux.tar.gz | awk '{print $1}')
          MAC_SHA=$(shasum -a 256 macos.tar.gz | awk '{print $1}')

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "linux_url=${LINUX_URL}" >> $GITHUB_OUTPUT
          echo "mac_url=${MAC_URL}" >> $GITHUB_OUTPUT
          echo "linux_sha=${LINUX_SHA}" >> $GITHUB_OUTPUT
          echo "mac_sha=${MAC_SHA}" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap repository
        uses: actions/checkout@v4
        with:
          repository: JLBBARCO/homebrew-tap
          token: ${{ steps.tap_token.outputs.token }}
          path: homebrew-tap

      - name: Update formula
        run: |
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/passwords-manager.rb << EOF
          class PasswordsManager < Formula
            desc "Password manager with encrypted local storage"
            homepage "https://github.com/JLBBARCO/passwords-manager"
            version "${{ steps.vars.outputs.version }}"

            on_macos do
              url "${{ steps.vars.outputs.mac_url }}"
              sha256 "${{ steps.vars.outputs.mac_sha }}"
            end

            on_linux do
              url "${{ steps.vars.outputs.linux_url }}"
              sha256 "${{ steps.vars.outputs.linux_sha }}"
            end

            def install
              bin.install "passwords-manager"
              prefix.install "README.md" if File.exist?("README.md")
              prefix.install "LICENSE" if File.exist?("LICENSE")
            end

            test do
              assert_predicate bin/"passwords-manager", :exist?
            end
          end
          EOF

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/passwords-manager.rb
          git commit -m "chore: update passwords-manager to ${{ steps.vars.outputs.version }}" || exit 0
          git push
