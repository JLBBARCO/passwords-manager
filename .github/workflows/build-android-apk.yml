name: Build Android APK

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  android-readiness:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      reason: ${{ steps.check.outputs.reason }}
      spec_path: ${{ steps.check.outputs.spec_path }}
      spec_dir: ${{ steps.check.outputs.spec_dir }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Android build readiness
        id: check
        shell: bash
        run: |
          READY=true
          REASON="ready"
          SPEC_PATH=""
          SPEC_DIR="."

          if [[ -f "buildozer.spec" ]]; then
            SPEC_PATH="buildozer.spec"
            SPEC_DIR="."
          elif [[ -f "android/buildozer.spec" ]]; then
            SPEC_PATH="android/buildozer.spec"
            SPEC_DIR="android"
          fi

          if [[ ! -f "android/main.py" ]]; then
            READY=false
            REASON="android/main.py not found. Add an Android entry point for Kivy."
          fi

          if [[ "${READY}" == "true" ]] && [[ -z "${SPEC_PATH}" ]]; then
            SPEC_PATH="buildozer.spec"
            SPEC_DIR="."
            REASON="buildozer.spec missing, fallback spec will be generated during build."
          fi

          if [[ "${READY}" == "true" ]] && ! grep -qE "^source\.dir[[:space:]]*=[[:space:]]*(android|\.)$" "${SPEC_PATH}"; then
            READY=false
            REASON="buildozer.spec must contain either 'source.dir = android' or 'source.dir = .'."
          fi

          echo "ready=${READY}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          echo "spec_path=${SPEC_PATH}" >> "$GITHUB_OUTPUT"
          echo "spec_dir=${SPEC_DIR}" >> "$GITHUB_OUTPUT"

      - name: Publish readiness summary
        shell: bash
        run: |
          echo "Android readiness: ${{ steps.check.outputs.ready }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Reason: ${{ steps.check.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Spec file: ${{ steps.check.outputs.spec_path }}" >> "$GITHUB_STEP_SUMMARY"

  build-android-apk:
    needs: android-readiness
    if: needs.android-readiness.outputs.ready == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Android build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev

          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Ensure buildozer spec exists
        shell: bash
        run: |
          if [[ -f "buildozer.spec" || -f "android/buildozer.spec" ]]; then
            echo "buildozer.spec found"
          else
            if [[ ! -f "android/main.py" ]]; then
              echo "android/main.py not found" >&2
              exit 1
            fi

            printf '%s\n' \
              '[app]' \
              'title = Passwords Manager' \
              'package.name = passwordsmanager' \
              'package.domain = com.jlbbarco' \
              'source.dir = android' \
              'source.include_exts = py,png,jpg,jpeg,kv,atlas' \
              'version = 0.0.0' \
              'requirements = python3,kivy==2.3.0' \
              'orientation = portrait' \
              'fullscreen = 0' \
              'android.permissions = INTERNET' \
              'android.api = 33' \
              'android.minapi = 24' \
              'android.ndk = 25b' \
              'android.archs = arm64-v8a,armeabi-v7a' \
              '' \
              '[buildozer]' \
              'log_level = 2' \
              'warn_on_root = 1' \
              > buildozer.spec

            echo "Generated fallback buildozer.spec at repository root"
          fi

          SPEC_PATH="buildozer.spec"
          if [[ -f "android/buildozer.spec" ]]; then
            SPEC_PATH="android/buildozer.spec"
          fi
          if ! grep -qE "^android\.accept_sdk_license[[:space:]]*=[[:space:]]*True$" "${SPEC_PATH}"; then
            echo "android.accept_sdk_license = True" >> "${SPEC_PATH}"
          fi

      - name: Build APK (debug)
        shell: bash
        run: |
          SPEC_DIR="${{ needs.android-readiness.outputs.spec_dir }}"
          BUILD_LOG="${RUNNER_TEMP}/buildozer-debug.log"

          run_build() {
            local build_status=0

            if [[ "${SPEC_DIR}" == "android" ]]; then
              pushd android >/dev/null
              set +e
              buildozer android debug 2>&1 | tee "${BUILD_LOG}"
              build_status=${PIPESTATUS[0]}
              set -e
              popd >/dev/null
            else
              set +e
              buildozer android debug 2>&1 | tee "${BUILD_LOG}"
              build_status=${PIPESTATUS[0]}
              set -e
            fi

            if [[ ${build_status} -ne 0 ]]; then
              echo "Buildozer failed. Last 200 log lines:"
              tail -n 200 "${BUILD_LOG}" || true
              echo "Filtered failure lines:"
              grep -Ei "error:|traceback|exception|aidl|sdkmanager|license|failed to execute|no such file|command not found" "${BUILD_LOG}" | tail -n 120 || true
            fi

            return ${build_status}
          }

          accept_android_licenses() {
            SDK_ROOT=$(find "$HOME/.buildozer" -type d -path "*/android-sdk" | head -n 1 || true)
            if [[ -z "${SDK_ROOT}" ]]; then
              echo "Android SDK root not found yet under ~/.buildozer; skipping proactive license acceptance."
              return 0
            fi

            SDKMANAGER_PATH=""
            if [[ -x "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" ]]; then
              SDKMANAGER_PATH="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
            elif [[ -x "${SDK_ROOT}/tools/bin/sdkmanager" ]]; then
              SDKMANAGER_PATH="${SDK_ROOT}/tools/bin/sdkmanager"
            fi

            if [[ -z "${SDKMANAGER_PATH}" ]]; then
              echo "sdkmanager not found yet under ~/.buildozer; skipping proactive license acceptance."
              return 0
            fi

            mkdir -p "$HOME/.android"
            touch "$HOME/.android/repositories.cfg"

            mkdir -p "${SDK_ROOT}/licenses"
            printf '%s\n' \
              '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
              'd56f5187479451eabf01fb78af6dfcb131a6481e' \
              > "${SDK_ROOT}/licenses/android-sdk-license"
            printf '%s\n' \
              '84831b9409646a918e30573bab4c9c91346d8abd' \
              > "${SDK_ROOT}/licenses/android-sdk-preview-license"

            yes | "${SDKMANAGER_PATH}" --sdk_root="${SDK_ROOT}" --licenses >/dev/null || true
            yes | "${SDKMANAGER_PATH}" --sdk_root="${SDK_ROOT}" --update >/dev/null || true
            yes | "${SDKMANAGER_PATH}" --sdk_root="${SDK_ROOT}" \
              "platform-tools" "platforms;android-33" "build-tools;33.0.2" "build-tools;37.0.0-rc2" >/dev/null || true
          }

          accept_android_licenses

          if ! run_build; then
            echo "First Android build attempt failed. Accepting Android SDK licenses and retrying once..."
            accept_android_licenses
            run_build
          fi

      - name: Collect APK outputs
        shell: bash
        run: |
          mkdir -p artifacts
          find . -type f -path "*/bin/*.apk" -exec cp {} artifacts/ \;
          if [[ -f "${RUNNER_TEMP}/buildozer-debug.log" ]]; then
            cp "${RUNNER_TEMP}/buildozer-debug.log" artifacts/buildozer-debug.log
          fi
          if ! ls artifacts/*.apk >/dev/null 2>&1; then
            echo "No APK files found in */bin/*.apk after build" >&2
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwords-manager-android-apk
          path: |
            artifacts/*.apk
            artifacts/buildozer-debug.log

      - name: Attach APK to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android-not-ready:
    needs: android-readiness
    if: needs.android-readiness.outputs.ready != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Explain why APK was skipped
        shell: bash
        run: |
          echo "APK build skipped automatically." >> "$GITHUB_STEP_SUMMARY"
          echo "Reason: ${{ needs.android-readiness.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "To enable APK generation, keep buildozer.spec at root or at android/buildozer.spec and android/main.py as mobile entrypoint." >> "$GITHUB_STEP_SUMMARY"
