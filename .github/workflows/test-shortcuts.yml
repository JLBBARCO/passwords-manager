name: Test Shortcuts Integration

on:
    push:
        branches:
            - main
            - develop
        paths:
            - "src/lib/shortcuts/**"
            - "src/lib/app/**"
            - "main.py"
            - "scripts/validate_shortcuts.py"
            - ".github/workflows/test-shortcuts.yml"
    pull_request:
        branches:
            - main
            - develop
        paths:
            - "src/lib/shortcuts/**"
            - "src/lib/app/**"
            - "main.py"
            - "scripts/validate_shortcuts.py"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test-shortcuts-windows:
        name: Test Shortcuts (Windows)
        runs-on: windows-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Validate validator script
              run: |
                  python -m py_compile scripts/validate_shortcuts.py

            - name: Validate shortcut creation on first run (integration test)
              shell: powershell
              run: |
                  .\scripts\test-shortcuts-integration.ps1 -Cleanup

    test-shortcuts-validation:
        name: Validate Shortcuts After Creation
        runs-on: windows-latest
        needs: [test-shortcuts-windows]
        if: always()

        steps:
            - name: Report test results
              run: |
                  echo "✓ All shortcut integration tests completed"
                  Write-Host "✓ Windows shortcut checks completed"
              shell: powershell
