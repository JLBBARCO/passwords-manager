name: Test Shortcuts Integration

on:
    push:
        branches:
            - main
            - develop
        paths:
            - "src/lib/shortcuts/**"
            - "src/lib/app/**"
            - "main.py"
            - "scripts/validate_shortcuts.py"
            - "scripts/test-shortcuts-integration.*"
            - ".github/workflows/test-shortcuts.yml"
    pull_request:
        branches:
            - main
            - develop
        paths:
            - "src/lib/shortcuts/**"
            - "src/lib/app/**"
            - "main.py"
            - "scripts/validate_shortcuts.py"
            - "scripts/test-shortcuts-integration.*"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test-shortcuts-windows:
        name: Test Shortcuts (Windows)
        runs-on: windows-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Validate validator script
              run: |
                  python -m py_compile scripts/validate_shortcuts.py

            - name: Validate shortcut creation on first run (integration test)
              shell: powershell
              run: |
                  .\scripts\test-shortcuts-integration.ps1 -Cleanup

    test-shortcuts-linux:
        name: Test Shortcuts (Linux)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  sudo apt-get update
                  sudo apt-get install -y python3-tk xclip

            - name: Validate validator script
              run: |
                  python -m py_compile scripts/validate_shortcuts.py

            - name: Validate shortcut creation on first run (integration test)
              shell: bash
              run: |
                  chmod +x scripts/test-shortcuts-integration.sh
                  scripts/test-shortcuts-integration.sh --cleanup

    test-shortcuts-macos:
        name: Test Shortcuts (macOS)
        runs-on: macos-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Validate validator script
              run: |
                  python -m py_compile scripts/validate_shortcuts.py

            - name: Validate shortcut creation on first run (integration test)
              shell: bash
              run: |
                  chmod +x scripts/test-shortcuts-integration.sh
                  scripts/test-shortcuts-integration.sh --cleanup

    test-shortcuts-validation:
        name: Validate Shortcuts After Creation
        runs-on: ${{ matrix.os }}
        needs:
            [test-shortcuts-windows, test-shortcuts-linux, test-shortcuts-macos]
        if: always()
        strategy:
            matrix:
                os: [windows-latest, ubuntu-latest, macos-latest]
                exclude:
                    - os: windows-latest
                      # Windows already validates in its own step
                    - os: ubuntu-latest
                      # Linux already validates in its own step
                    - os: macos-latest
                      # macOS already validates in its own step

        steps:
            - name: Report test results
              run: |
                  echo "✓ All shortcut integration tests completed"
                  if [ "${{ job.status }}" == "success" ]; then
                    echo "✓ All systems created shortcuts correctly"
                  else
                    echo "✗ Some tests failed - check logs above"
                    exit 1
                  fi
              shell: bash
