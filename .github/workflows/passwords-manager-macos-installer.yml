name: build-passwords-manager-macos-installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    uses: JLBBARCO/homebrew-tap/.github/workflows/reusable-macos-installer.yml@main
    with:
      app_name: Passwords Manager
      bundle_identifier: com.jlbbarco.passwords-manager
      app_path: dist/Passwords Manager.app
      artifact_name: passwords-manager-macos-installer.pkg
      build_command: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt pyinstaller
        python -m PyInstaller --noconfirm --windowed --name "Passwords Manager" main.py
